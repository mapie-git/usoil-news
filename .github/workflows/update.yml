name: Update USOIL News
on:
  schedule:
    - cron: '*/30 * * * *'  # 30分ごと（EIA水曜発表も30分以内に反映）
  workflow_dispatch:  # 手動実行ボタンも有効

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: docs/cache.db
          key: cache-db-${{ github.run_id }}
          restore-keys: |
            cache-db-

      - name: Run fetch_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/news.json
          git diff --staged --quiet || git commit -m "Update news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
