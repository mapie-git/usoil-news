name: Update USOIL News
on:
  schedule:
    - cron: '*/20 * * * *'  # 20分ごと
    - cron: '32 14 * * 3'  # 毎週水曜 23:32 JST = 夏時間（EDT）EIA発表2分後
    - cron: '32 15 * * 3'  # 毎週水曜 0:32 JST翌日 = 冬時間（EST）EIA発表2分後
  workflow_dispatch:  # 手動実行ボタンも有効

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run fetch_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/cache.db
          git diff --staged --quiet || git commit -m "Update news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
