name: Update USOIL News
on:
  schedule:
    - cron: '0 1,3,5,7,9,11,13,17,19,21,23 * * *'  # 2時間ごと（UTC）= JST 10,12,14,16,18,20,22,0,2,4,6,8時（EIA時間帯を除く）
    - cron: '35 14 * * 3'  # 毎週水曜 23:35 JST（UTC 14:35）= EIA週報発表後 ※タイミング確認後に分を調整
  workflow_dispatch:  # 手動実行ボタンも有効

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run fetch_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
